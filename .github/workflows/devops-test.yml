name: DevOps CI Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install flake8

      - name: Lint code
        run: flake8 health_check.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Health Check
        run: python health_check.py

      - name: Build Docker Image
        run: docker build -t health-check-app .

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan
