name: DevOps CI Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run a diagnostic test
        run: |
          echo "Starting DevOps Pipeline..."
          echo "Checking system version:"
          lsb_release -a
          echo "Memory check:"
          free -h

      - name: Simulate Deployment
        run: echo "Deployment to Staging Successful!"
